name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      EC2_DEPLOY_USER: ${{ secrets.EC2_DEPLOY_USER }}
      APP_DIR: ${{ secrets.EC2_APP_DIR }}
      BRANCH: dev
      REPO_URL: https://github.com/sangcsy/Vuln_Trade.git

    steps:
      - name: Validate required secrets
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$EC2_INSTANCE_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy with SSM Run Command
        id: deploy
        run: |
          set -euo pipefail

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Vuln_Trade from GitHub Actions ${GITHUB_SHA}" \
            --parameters commands="[
              \"set -e\",
              \"DEPLOY_USER='${EC2_DEPLOY_USER}'\",
              \"if [ -z \\\"\\\$DEPLOY_USER\\\" ]; then DEPLOY_USER=ec2-user; fi\",
              \"DEPLOY_HOME=\\\$(getent passwd \\\"\\\$DEPLOY_USER\\\" | cut -d: -f6)\",
              \"APP_DIR='${APP_DIR}'\",
              \"if [ -z \\\"\\\$APP_DIR\\\" ]; then APP_DIR=\\\"\\\$DEPLOY_HOME/Vuln_Trade\\\"; fi\",
              \"BRANCH='${BRANCH}'\",
              \"REPO_URL='${REPO_URL}'\",
              \"runuser -l \\\"\\\$DEPLOY_USER\\\" -c \\\"set -e; if [ ! -d '\\\$APP_DIR/.git' ]; then git clone --branch '\\\$BRANCH' '\\\$REPO_URL' '\\\$APP_DIR'; fi; cd '\\\$APP_DIR'; git fetch origin '\\\$BRANCH'; git checkout '\\\$BRANCH'; git pull --ff-only origin '\\\$BRANCH'; if [ ! -f .env ]; then cp .env.example .env; fi; docker compose up -d --build; docker image prune -f\\\"\"
            ]" \
            --query "Command.CommandId" \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          for attempt in $(seq 1 120); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "$STATUS" in
              Success|Cancelled|TimedOut|Failed|Cancelling)
                break
                ;;
            esac

            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json

          test "$STATUS" = "Success"
