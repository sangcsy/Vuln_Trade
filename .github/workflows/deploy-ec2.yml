name: Deploy to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      APP_DIR: ${{ secrets.EC2_APP_DIR }}
      BRANCH: dev
      REPO_URL: https://github.com/sangcsy/Vuln_Trade.git

    steps:
      - name: Validate required secrets
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "set -e
             APP_DIR=\"$APP_DIR\"
             if [ -z \"\$APP_DIR\" ]; then
               APP_DIR=\"\$HOME/Vuln_Trade\"
             fi
             BRANCH=\"$BRANCH\"
             REPO_URL=\"$REPO_URL\"
             if [ ! -d \"\$APP_DIR/.git\" ]; then
               git clone --branch \"\$BRANCH\" \"\$REPO_URL\" \"\$APP_DIR\"
             fi
             cd \"\$APP_DIR\"
             git fetch origin \"\$BRANCH\"
             git checkout \"\$BRANCH\"
             git pull --ff-only origin \"\$BRANCH\"
             if [ ! -f .env ]; then
               cp .env.example .env
             fi
             docker compose up -d --build
             docker image prune -f"
