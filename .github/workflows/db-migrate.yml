name: DB Migration

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      EC2_DEPLOY_USER: ${{ secrets.EC2_DEPLOY_USER }}
      APP_DIR: ${{ secrets.EC2_APP_DIR }}
      BRANCH: dev

    steps:
      - name: Validate required secrets
        run: |
          test -n "$AWS_REGION"
          test -n "$AWS_ROLE_ARN"
          test -n "$EC2_INSTANCE_ID"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migration via SSM
        id: migrate
        run: |
          set -euo pipefail

          DEPLOY_USER="${EC2_DEPLOY_USER:-ec2-user}"
          APP_PATH="${APP_DIR:-/home/$DEPLOY_USER/Vuln_Trade}"

          # git fetch로 최신 migrate.sh를 EC2에 받아온 뒤 실행
          MIGRATE_CMD="cd '$APP_PATH' && git fetch origin && git checkout origin/$BRANCH -- db/migrate.sh && bash db/migrate.sh"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "DB Migration: add bank columns to users" \
            --parameters commands="[
              \"runuser -l '${DEPLOY_USER}' -c \\\"${MIGRATE_CMD}\\\"\"
            ]" \
            --query "Command.CommandId" \
            --output text)"

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

      - name: Show migration output
        if: always()
        run: |
          echo "=== stdout ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.migrate.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
          echo "=== stderr ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.migrate.outputs.command_id }}" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text
