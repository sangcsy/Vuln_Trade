{% extends "base.html" %}
{% block title %}게시글 관리{% endblock %}
{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>게시글 관리</h1>
  </div>
</section>
<div class="feed-list">
  {% for post in posts %}
    <div class="feed-item">
      <strong>{{ post.title }}</strong>
      <p>{{ post.display_name }} · {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
      <div class="meta-row" style="margin-top:8px;gap:8px;">
        <a href="{{ url_for('community.detail', post_id=post.id) }}" class="button inline-btn action-chip" style="font-size:13px;padding:4px 12px;">보기</a>
        <a href="{{ url_for('admin.edit_post', post_id=post.id) }}" class="button inline-btn action-chip" style="font-size:13px;padding:4px 12px;background:var(--blue);color:#fff;border-color:var(--blue);">수정</a>
        <form method="post" action="{{ url_for('admin.delete_post', post_id=post.id) }}" style="display:inline;" onsubmit="return confirm('이 게시글을 삭제하시겠습니까?')">
          <button type="submit" class="button inline-btn action-chip" style="font-size:13px;padding:4px 12px;background:var(--red);color:#fff;border-color:var(--red);">삭제</button>
        </form>
      </div>
    </div>
  {% else %}
    <p class="empty">게시글이 없습니다.</p>
  {% endfor %}
</div>
{% endblock %}
