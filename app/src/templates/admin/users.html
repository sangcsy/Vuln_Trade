{% extends "base.html" %}
{% block title %}사용자 관리{% endblock %}
{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">Admin</p>
    <h1>사용자 관리</h1>
  </div>
</section>

<section class="card">
  <form method="get" class="form-card compact">
    <label>사용자 검색</label>
    <input type="text" name="q" value="{{ q or '' }}" placeholder="아이디 또는 표시 이름">
    <button type="submit" class="button primary inline-btn action-chip">검색</button>
  </form>
</section>

<div class="feed-list">
  {% for user in users %}
    <div class="feed-item">
      <strong>{{ user.display_name }} ({{ user.username }})</strong>
      <div class="meta-row">
        <span>ID {{ user.id }}</span>
        <span>{{ user.role }}</span>
        <span>{{ "{:,}".format(user.balance) }}원</span>
      </div>
      <div class="meta-row" style="margin-top:8px;gap:8px;">
        <a href="{{ url_for('admin.edit_user', user_id=user.id) }}" class="button inline-btn action-chip" style="font-size:13px;padding:4px 12px;background:var(--blue);color:#fff;border-color:var(--blue);">수정</a>
        <form method="post" action="{{ url_for('admin.delete_user', user_id=user.id) }}" style="display:inline;" onsubmit="return confirm('{{ user.display_name }} 사용자를 삭제하시겠습니까?')">
          <button type="submit" class="button inline-btn action-chip" style="font-size:13px;padding:4px 12px;background:var(--red);color:#fff;border-color:var(--red);">삭제</button>
        </form>
      </div>
    </div>
  {% else %}
    <p class="empty">조회된 사용자가 없습니다.</p>
  {% endfor %}
</div>
{% endblock %}
