{% extends "base.html" %}
{% block title %}피드{% endblock %}
{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">사용자 커뮤니티</p>
    <h1>실시간 피드</h1>
  </div>
  {% if current_user %}
  <a class="button primary inline-btn feed-write-btn" href="{{ url_for('community.write') }}">글쓰기</a>
  {% endif %}
</section>
<div class="feed-grid">
  {% for post in posts %}
  <a class="feed-card" href="{{ url_for('community.detail', post_id=post.id) }}">
    <strong>{{ post.title }}</strong>
    <p>{{ post.display_name }} · {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</p>
  </a>
  {% endfor %}
</div>
{% endblock %}
