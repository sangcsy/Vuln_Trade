{% extends "base.html" %}
{% block title %}글 수정{% endblock %}
{% block content %}
<section class="card">
  <h1>게시글 수정</h1>
  <form method="post" class="form-card">
    <label>제목</label>
    <input type="text" name="title" value="{{ post.title }}">
    <label>본문</label>
    <textarea name="content" rows="10">{{ post.content }}</textarea>
    <button type="submit" class="button primary">수정 저장</button>
  </form>
</section>
{% endblock %}
